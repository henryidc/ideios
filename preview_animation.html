<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ideios — Generating Preview</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0e1117;
    color: #fafafa;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 60px 20px;
    margin: 0;
  }

  h1 { font-size: 2rem; margin-bottom: 8px; }
  .status-box {
    width: 100%;
    max-width: 600px;
    background: #1e2130;
    border: 1px solid #2e3250;
    border-radius: 8px;
    overflow: hidden;
    margin-top: 32px;
  }
  .status-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 18px;
    font-weight: 600;
    font-size: 0.95rem;
    border-bottom: 1px solid #2e3250;
  }
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid #444;
    border-top-color: #7c83ff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }
  .checkmark {
    width: 16px; height: 16px;
    flex-shrink: 0;
    display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .steps { padding: 10px 18px 14px; }
  .step {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 0;
    font-size: 0.88rem;
    color: #aaa;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.3s, transform 0.3s;
  }
  .step.visible { opacity: 1; transform: translateY(0); }
  .step.done { color: #fafafa; }
  .step-icon { font-size: 1rem; width: 20px; text-align: center; }
  .step-spinner {
    width: 12px; height: 12px;
    border: 1.5px solid #444;
    border-top-color: #7c83ff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }
  .step-check { display: none; color: #4caf7d; font-size: 0.9rem; }
  .step.done .step-spinner { display: none; }
  .step.done .step-check { display: inline; }
  .step.active .step-spinner { display: inline-block; }

  .done-label { color: #4caf7d; }
  .replay {
    margin-top: 28px;
    padding: 10px 24px;
    background: #7c83ff;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 0.9rem;
    cursor: pointer;
  }
  .replay:hover { background: #636aff; }
</style>
</head>
<body>

<h1>Writing your essay...</h1>

<div class="status-box">
  <div class="status-header">
    <div class="spinner" id="header-spinner"></div>
    <svg class="checkmark" id="header-check" viewBox="0 0 16 16" fill="none">
      <circle cx="8" cy="8" r="7" stroke="#4caf7d" stroke-width="1.5"/>
      <path d="M4.5 8l2.5 2.5 4-4" stroke="#4caf7d" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span id="header-label">Working on your essay — this takes about 30–60 seconds.</span>
  </div>
  <div class="steps" id="steps"></div>
</div>

<button class="replay" onclick="replay()">Replay</button>

<script>
const STEPS = [
  { icon: "🔍", label: "Generating search query..." },
  { icon: "🌐", label: "Searching the web..." },
  { icon: "📋", label: "Compiling research brief..." },
  { icon: "✍️", label: "Writing first draft..." },
  { icon: "🧐", label: "Reviewing draft..." },
  { icon: "✨", label: "Refining final essay..." },
];

const DELAYS = [400, 1200, 2200, 3400, 5000, 6400, 8200];

let timers = [];

function buildSteps() {
  const container = document.getElementById("steps");
  container.innerHTML = "";
  STEPS.forEach((s, i) => {
    const div = document.createElement("div");
    div.className = "step";
    div.id = `step-${i}`;
    div.innerHTML = `
      <span class="step-icon">${s.icon}</span>
      <span>${s.label}</span>
      <span style="margin-left:auto; display:flex; align-items:center;">
        <span class="step-spinner" style="display:none"></span>
        <span class="step-check">✓</span>
      </span>`;
    container.appendChild(div);
  });
}

function run() {
  STEPS.forEach((_, i) => {
    // show step
    timers.push(setTimeout(() => {
      const el = document.getElementById(`step-${i}`);
      el.classList.add("visible", "active");
      el.querySelector(".step-spinner").style.display = "inline-block";
    }, DELAYS[i]));

    // complete step
    timers.push(setTimeout(() => {
      const el = document.getElementById(`step-${i}`);
      el.classList.remove("active");
      el.classList.add("done");
    }, DELAYS[i + 1] - 200));
  });

  // finish
  timers.push(setTimeout(() => {
    document.getElementById("header-spinner").style.display = "none";
    const check = document.getElementById("header-check");
    check.style.display = "block";
    document.getElementById("header-label").textContent = "Essay complete!";
    document.getElementById("header-label").classList.add("done-label");
  }, DELAYS[DELAYS.length - 1]));
}

function replay() {
  timers.forEach(clearTimeout);
  timers = [];
  document.getElementById("header-spinner").style.display = "block";
  document.getElementById("header-check").style.display = "none";
  const lbl = document.getElementById("header-label");
  lbl.textContent = "Working on your essay — this takes about 30–60 seconds.";
  lbl.classList.remove("done-label");
  buildSteps();
  run();
}

buildSteps();
run();
</script>
</body>
</html>
